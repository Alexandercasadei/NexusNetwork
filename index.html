    <title>Nexus Network - TheRealSamTV</title>

    <script>
      (function() {
        // 1. Tema immediato
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);

        // 2. Controllo Dominio e Sottocartella
        const currentHost = window.location.hostname;
        const currentPath = window.location.pathname;
        const officialHost = 'nexus-network.it';
        const officialPath = '/NexusNetwork/';

        // Se non sono sul dominio corretto o non sono nella cartella corretta (e non sono in locale)
        if (currentHost !== 'localhost' && currentHost !== '127.0.0.1') {
            if (currentHost !== officialHost || !currentPath.startsWith(officialPath)) {
                window.location.replace('https://' + officialHost + officialPath);
            }
        }
      })();
    </script>
