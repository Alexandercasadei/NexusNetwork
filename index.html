    <script>
        // 1. GESTIONE TEMA IMMEDIATA
        const savedTheme = localStorage.getItem("theme") || "dark";
        document.documentElement.setAttribute("data-theme", savedTheme);

        // 2. FIX PERCORSI E REDIRECT (Evita la pagina bianca)
        (function() {
            const host = window.location.hostname;
            const path = window.location.pathname;
            
            // Se l'utente entra da alexandercasadei.github.io, lo mandiamo sul dominio ufficiale
            if (host.includes('github.io')) {
                window.location.replace('https://nexus-network.it/NexusNetwork/');
                return;
            }

            // Se siamo sul dominio ufficiale ma manca la sottocartella /NexusNetwork/
            if (host === 'nexus-network.it' && !path.includes('/NexusNetwork/')) {
                window.location.replace('https://nexus-network.it/NexusNetwork/');
            }
        })();
    </script>
