<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creator - Nexus Network</title>

    <!-- Favicon -->
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../../Favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="../../Favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="../../Favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="../../Favicon/site.webmanifest" />
    <link rel="shortcut icon" href="../../Favicon/favicon.ico" />

    <!-- CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://cdn.jsdelivr.net https://embed.twitch.tv https://www.gstatic.com https://*.firebasejs.com https://*.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; connect-src 'self' https://decapi.me https://cdn.jsdelivr.net https://api.github.com https://*.googleapis.com https://*.firebaseio.com https://*.cloudfunctions.net https://www.gstatic.com; frame-src 'self' https://player.twitch.tv https://www.twitch.tv https://embed.twitch.tv;"
    />

    <script src="https://cdn.jsdelivr.net/npm/tsparticles@2.12.0/tsparticles.bundle.min.js"></script>
    <script>
      const savedTheme = localStorage.getItem("theme") || "dark";
      document.documentElement.setAttribute("data-theme", savedTheme);
    </script>

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link rel="stylesheet" href="../../css/style.css" />
  </head>

  <body>
    <!-- NAV -->
    <nav class="nav-container">
      <div class="nav-glass">
        <a href="/" class="nav-item">Home</a>
        <a href="/services" class="nav-item">Servizi</a>
        <a href="/team" class="nav-item">Team</a>
        <a href="/creators" class="nav-item text-cyan-400">Creator</a>
        <a href="/live" class="nav-item">Dirette</a>
        <a href="/contacts" class="nav-item">Candidati</a>

        <button id="theme-toggle" class="ml-2">
          <i class="fas fa-moon"></i>
        </button>
      </div>
    </nav>

    <!-- HERO -->
    <section class="min-h-[50vh] flex flex-col justify-center items-center text-center px-6 relative overflow-hidden">
      <div id="tsparticles" class="absolute inset-0 -z-10"></div>
      <h1 class="text-5xl md:text-7xl font-extrabold text-cyan-400 neon mb-6">
        I CREATOR
      </h1>
      <p class="max-w-2xl text-gray-400 text-lg">
        Scopri i talenti che animano la nostra community ogni giorno.
      </p>
    </section>

    <!-- LISTA -->
    <section class="py-24 px-6 max-w-7xl mx-auto">
      <h2 class="text-2xl font-bold text-cyan-400 mb-10">
        I Creator
      </h2>
      <div
        id="creators-grid"
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-10"
      ></div>
    </section>

    <!-- MODALE -->
    <div id="creatorModal" class="fixed inset-0 hidden bg-black/75 z-50">
      <div class="glass rounded-2xl max-w-lg w-full p-6 relative mx-auto mt-24">
        <button onclick="closeCreator()" class="absolute top-4 right-4 text-2xl">
          &times;
        </button>
        <h3 id="mName" class="text-2xl font-bold"></h3>
        <p id="mDesc" class="text-gray-400"></p>
      </div>
    </div>

    <!-- FOOTER -->
    <footer class="py-16 px-6 text-center text-gray-500">
      © 2025 Nexus Network — ShadowStrike
    </footer>

    <script src="/js/script.js"></script>
    <script type="module" src="/pages/creators/js/creators-loader.js"></script>
  </body>
</html>
